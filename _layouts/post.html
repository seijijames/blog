<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ page.title }} | Seiji James</title>
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>

<body>

<div class="post-page">

  <a class="back-link" href="{{ '/blog/' | relative_url }}">← back to blog</a>

  <article class="post">

    <header class="post-header">
      <h1>{{ page.title }}</h1>
      <p class="post-date">
        {{ page.date | date: "%B %-d, %Y" }}
      </p>
    </header>

    <div class="post-content">
      {{ content }}
    </div>

  </article>

</div>

</body>
</html>
